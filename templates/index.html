<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow AI 🤖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #0d0d0d; color: #fff; height: 100vh; display: flex; flex-direction: column; }

        /* Login */
        #login-box {
            position: fixed; inset: 0; background: #0d0d0d;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 15px; z-index: 10;
        }
        #login-box h2 { font-size: 32px; margin-bottom: 10px; }
        #login-box input {
            padding: 12px 16px; border-radius: 12px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; width: 300px; font-size: 15px;
        }
        #login-box input:focus { outline: none; border-color: #f5c518; }
        .btn {
            padding: 12px 30px; border: none; border-radius: 12px;
            cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s;
        }
        .btn-primary { background: #f5c518; color: #000; width: 300px; }
        .btn-primary:hover { background: #e6b800; }
        .btn-secondary { background: #1a1a1a; color: #fff; width: 300px; border: 1px solid #333; }
        .btn-secondary:hover { background: #222; }
        #login-msg { color: #e94560; font-size: 14px; }

        /* Header */
        #header {
            background: #111; padding: 15px 20px;
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #222;
        }
        #header h1 { font-size: 20px; color: #f5c518; }
        #header span { font-size: 13px; color: #888; margin-right: auto; }
        #logout-btn {
            padding: 6px 14px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px;
        }

        /* Chat */
        #chat-box {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .msg-wrap { display: flex; flex-direction: column; }
        .msg-wrap.user { align-items: flex-start; }
        .msg-wrap.ai { align-items: flex-end; }
        .msg-label { font-size: 11px; color: #555; margin-bottom: 4px; }
        .msg {
            max-width: 75%; padding: 12px 16px;
            border-radius: 16px; font-size: 15px; line-height: 1.6;
        }
        .msg.user { background: #1a1a1a; border: 1px solid #2a2a2a; }
        .msg.ai { background: #f5c518; color: #000; }
        .typing { color: #555; font-size: 14px; padding: 5px 10px; }

        /* Input */
        #input-area {
            display: flex; padding: 15px; gap: 10px;
            background: #111; border-top: 1px solid #222;
        }
        #msg-input {
            flex: 1; padding: 12px 16px; border-radius: 12px;
            border: 1px solid #333; background: #1a1a1a;
            color: #fff; font-size: 15px;
        }
        #msg-input:focus { outline: none; border-color: #f5c518; }
        #send-btn {
            padding: 12px 20px; background: #f5c518; color: #000;
            border: none; border-radius: 12px; cursor: pointer;
            font-size: 18px; font-weight: bold;
        }
        #send-btn:hover { background: #e6b800; }

        /* Scrollbar */
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-box">
    <h2>🤖 Yellow AI</h2>
    <p style="color:#888; margin-bottom:5px">مساعدك الذكي الشخصي</p>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter') login()">
    <button class="btn btn-primary" onclick="login()">دخول</button>
    <button class="btn btn-secondary" onclick="register()">تسجيل جديد</button>
    <p id="login-msg"></p>
</div>

<!-- Header -->
<div id="header" style="display:none">
    <h1>🤖 Yellow AI</h1>
    <span id="user-label"></span>
    <button id="logout-btn" onclick="logout()">خروج</button>
</div>

<!-- Chat -->
<div id="chat-box" style="display:none"></div>

<!-- Input -->
<div id="input-area" style="display:none">
    <button id="send-btn" onclick="sendMsg()">➤</button>
    <input type="text" id="msg-input" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMsg()">
</div>

<script>
    let token = null;

    async function register() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        if (!u || !p) return;
        const res = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        document.getElementById("login-msg").textContent = data.msg || data.detail;
    }

    async function login() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        if (!u || !p) return;
        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if (data.access_token) {
            token = data.access_token;
            document.getElementById("login-box").style.display = "none";
            document.getElementById("header").style.display = "flex";
            document.getElementById("chat-box").style.display = "flex";
            document.getElementById("input-area").style.display = "flex";
            document.getElementById("user-label").textContent = "مرحباً " + u + " 👋";
            addMsg("أهلاً! كيف أقدر أساعدك اليوم؟ 🤖", "ai");
            document.getElementById("msg-input").focus();
        } else {
            document.getElementById("login-msg").textContent = "خطأ في البيانات";
        }
    }

    function logout() {
        token = null;
        document.getElementById("login-box").style.display = "flex";
        document.getElementById("header").style.display = "none";
        document.getElementById("chat-box").style.display = "none";
        document.getElementById("input-area").style.display = "none";
        document.getElementById("chat-box").innerHTML = "";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
    }

    async function sendMsg() {
        const input = document.getElementById("msg-input");
        const msg = input.value.trim();
        if (!msg || !token) return;
        input.value = "";

        addMsg(msg, "user");

        // typing indicator
        const typing = document.createElement("div");
        typing.className = "typing";
        typing.id = "typing";
        typing.textContent = "Yellow AI يكتب...";
        document.getElementById("chat-box").appendChild(typing);
        scrollBottom();

        const res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({message: msg})
        });

        document.getElementById("typing")?.remove();
        const data = await res.json();
        addMsg(data.response, "ai");
    }

    function addMsg(text, type) {
        const box = document.getElementById("chat-box");
        const wrap = document.createElement("div");
        wrap.className = "msg-wrap " + type;
        const label = document.createElement("div");
        label.className = "msg-label";
        label.textContent = type === "user" ? "أنت" : "Yellow AI 🤖";
        const div = document.createElement("div");
        div.className = "msg " + type;
        div.textContent = text;
        wrap.appendChild(label);
        wrap.appendChild(div);
        box.appendChild(wrap);
        scrollBottom();
    }

    function scrollBottom() {
        const box = document.getElementById("chat-box");
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
